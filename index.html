<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Served under the GitSite /spa/ prefix. <base> makes the app's relative
         asset paths (tokens.css, .build/*.js) resolve under /spa/ regardless of
         trailing slash. Same-origin /b/* fetches are root-absolute and are NOT
         affected by base. -->
    <base href="/spa/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ConfigEC — Consultant CRM</title>

    <!-- Theme bootstrap: set data-theme (org palette, cached) + data-mode (per-user)
         on <html> BEFORE the stylesheets load, so the first paint is already themed
         (no light-flash). theme.js reasserts these + wires the auto listener.
         ── DEMO OVERRIDE ── data-theme is force-pinned to 'fairy' here so the
         whimsical/majestic palette shows regardless of any cached preference. To
         restore normal behavior, put the original `localStorage.getItem(...)` read
         back on the `var t=` line and drop the localStorage.setItem below. -->
    <script>(function(){try{
      var e=document.documentElement;
      var t='fairy';                              /* demo — was: localStorage.getItem('crm.theme')||'clinical' */
      try{localStorage.setItem('crm.theme','fairy');}catch(_){}
      var m=localStorage.getItem('crm.mode')||'auto';
      var r=(m==='light'||m==='dark')?m:(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
      e.setAttribute('data-theme',t); e.setAttribute('data-mode',r);
    }catch(_){}})();</script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" />
    <link rel="stylesheet" type="text/css" href="tokens.css" />
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <link rel="stylesheet" type="text/css" href="chatbot.css" />
    <link rel="stylesheet" type="text/css" href="appbuilder.css" />
  </head>
